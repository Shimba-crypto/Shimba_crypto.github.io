<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roblox Avatar Viewer</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
:root { --accent: #22c55e; }

body {
  background: #0a0a0a;
  transition: 0.3s ease;
}

.neon {
  background: #000;
}

.card {
  transition: 0.3s ease;
}

.neon .card {
  box-shadow: 0 0 35px var(--accent);
  border: 1px solid var(--accent);
}

.accent-bg { background: var(--accent); }
.accent-text { color: var(--accent); }

.fade-in {
  opacity: 0;
  transform: scale(0.95);
  transition: all 0.4s ease;
}

.fade-in.show {
  opacity: 1;
  transform: scale(1);
}
</style>
</head>

<body class="flex items-center justify-center min-h-screen text-white px-4">

<div class="card bg-white/5 backdrop-blur-xl p-6 sm:p-8 rounded-2xl w-full max-w-md border border-white/10 space-y-6">

  <!-- Header -->
  <div class="flex justify-between items-center">
    <h1 class="text-lg sm:text-xl font-bold tracking-widest">AVATAR VIEWER</h1>
    <div class="flex gap-2">
      <button onclick="toggleTheme()" class="text-xs border px-2 py-1 rounded">🌙</button>
      <button onclick="setAccent('#22c55e')" class="w-4 h-4 rounded-full bg-green-500"></button>
      <button onclick="setAccent('#00d1ff')" class="w-4 h-4 rounded-full bg-cyan-400"></button>
      <button onclick="setAccent('#ff0055')" class="w-4 h-4 rounded-full bg-pink-500"></button>
    </div>
  </div>

  <!-- Input -->
  <div class="flex flex-col sm:flex-row gap-2">
    <input id="username"
      class="flex-1 bg-black/40 border border-white/20 rounded-lg px-4 py-2 outline-none focus:border-[var(--accent)]"
      placeholder="Enter Username">
    <button onclick="fetchAvatar()"
      class="accent-bg text-black px-4 py-2 rounded-lg font-bold hover:scale-105 transition">
      VIEW
    </button>
  </div>

  <!-- Result -->
  <div id="result" class="hidden text-center space-y-4">

    <img id="avatar" class="w-40 sm:w-48 mx-auto border-4 rounded-full fade-in">

    <div>
      <div id="displayName" class="text-base sm:text-lg font-bold"></div>
      <div id="realUsername" class="text-sm text-gray-400"></div>
      <div id="userId" class="text-xs text-gray-500"></div>
    </div>

    <!-- Controls -->
    <div class="flex flex-wrap justify-center gap-2 text-xs">

      <select id="resolution" class="bg-black/40 border border-white/20 rounded px-2 py-1">
        <option value="150x150">150px</option>
        <option value="420x420" selected>420px</option>
        <option value="720x720">720px</option>
        <option value="1080x1080">1080px</option>
      </select>

      <button onclick="toggleShape()" class="border px-3 py-1 rounded">🔄 Shape</button>
      <button onclick="toggleRender()" class="border px-3 py-1 rounded">📸 Full Body</button>

    </div>

    <div class="flex flex-wrap justify-center gap-2 text-xs">

      <button onclick="copyURL()" class="border px-3 py-1 rounded">🔗 Copy URL</button>
      <button onclick="downloadImage()" class="accent-bg text-black px-3 py-1 rounded font-bold">🔘 Download</button>

    </div>

  </div>

  <div id="error" class="hidden text-red-400 text-center text-sm"></div>

</div>

<script>
let state = {
  user: null,
  circular: true,
  fullBody: false,
  currentURL: null
};

// Load saved theme
window.onload = () => {
  const savedAccent = localStorage.getItem("accent");
  const savedTheme = localStorage.getItem("theme");

  if (savedAccent) setAccent(savedAccent);
  if (savedTheme === "neon") document.body.classList.add("neon");
};

function setAccent(color) {
  document.documentElement.style.setProperty('--accent', color);
  localStorage.setItem("accent", color);
}

function toggleTheme() {
  document.body.classList.toggle('neon');
  localStorage.setItem("theme", document.body.classList.contains("neon") ? "neon" : "dark");
}

function toggleShape() {
  state.circular = !state.circular;
  const avatar = document.getElementById('avatar');
  avatar.classList.toggle('rounded-full', state.circular);
  avatar.classList.toggle('rounded-lg', !state.circular);
}

function toggleRender() {
  state.fullBody = !state.fullBody;
  if (state.user) fetchAvatar(state.user.name);
}

function downloadImage() {
  if (!state.currentURL) return;
  const link = document.createElement('a');
  link.href = state.currentURL;
  link.download = `${state.user.name}_avatar.png`;
  link.click();
}

function copyURL() {
  if (!state.currentURL) return;
  navigator.clipboard.writeText(state.currentURL);
  alert("Avatar URL copied!");
}

async function fetchAvatar(existingUsername = null) {
  const username = existingUsername || document.getElementById('username').value.trim();
  const resolution = document.getElementById('resolution').value;
  const result = document.getElementById('result');
  const error = document.getElementById('error');
  const avatar = document.getElementById('avatar');

  result.classList.add('hidden');
  error.classList.add('hidden');

  if (!username) return;

  try {
    const userRes = await fetch("https://corsproxy.io/?https://users.roblox.com/v1/usernames/users", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ usernames: [username], excludeBannedUsers: false })
    });

    const userData = await userRes.json();
    if (!userData.data?.length) throw "User not found";

    const user = userData.data[0];

    const endpoint = state.fullBody
      ? `https://thumbnails.roblox.com/v1/users/avatar?userIds=${user.id}&size=${resolution}&format=Png&isCircular=false`
      : `https://thumbnails.roblox.com/v1/users/avatar-headshot?userIds=${user.id}&size=${resolution}&format=Png&isCircular=false`;

    const thumbRes = await fetch("https://corsproxy.io/?" + endpoint);
    const thumbData = await thumbRes.json();

    if (!thumbData.data?.length) throw "Thumbnail error";

    state.user = user;
    state.currentURL = thumbData.data[0].imageUrl;

    avatar.classList.remove("show");
    avatar.src = state.currentURL;

    avatar.onload = () => avatar.classList.add("show");

    document.getElementById('displayName').textContent = user.displayName;
    document.getElementById('realUsername').textContent = "@" + user.name;
    document.getElementById('userId').textContent = "User ID: " + user.id;

    result.classList.remove('hidden');

  } catch (e) {
    error.textContent = "User not found or API error.";
    error.classList.remove('hidden');
  }
}
</script>

</body>
</html>
